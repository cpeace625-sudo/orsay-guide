<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FAFAF8" />
  <title>Musée d'Orsay</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css" />
  <script src="./script.js" defer></script>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-museum">Musée d'Orsay</div>
        <div class="header-title">오디오 가이드</div>
      </div>
      <div class="header-progress">
        <strong id="progressDone">0</strong> / <span id="progressTotal">0</span>
        <span style="font-size:11px;">감상 완료</span>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="#8E8E93" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="작품명 · 화가명 · 방 번호" autocomplete="off" />
      <button class="search-clear" id="searchClear">
        <svg viewBox="0 0 14 14" stroke-linecap="round"><line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- ★ 오프라인 전체 다운로드 버튼 추가 ★ -->
  <div class="offline-wrap">
    <button id="downloadAllBtn" class="download-btn">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      오프라인용 전체 다운로드
    </button>
  </div>

  <!-- Floor Tabs -->
  <div class="floor-wrap" id="floorWrap">
    <div class="floor-tabs" id="floorTabs"></div>
  </div>

  <!-- Room Tabs -->
  <div class="room-wrap" id="roomWrap">
    <div class="room-scroll" id="roomTabs"></div>
  </div>

  <!-- Section Header -->
  <div class="section-header">
    <span class="section-title" id="sectionTitle">작품 목록</span>
    <span class="section-count" id="sectionCount"></span>
  </div>

  <!-- Card List -->
  <div class="card-list" id="cardList">
    <div class="state-box"><div class="emoji">🖼</div>불러오는 중…</div>
  </div>

  <!-- Tab Bar -->
  <nav class="tab-bar">
    <div class="tab-item active" data-tab="home">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      <span>작품</span>
    </div>
    <div class="tab-item" data-tab="favorites">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span>즐겨찾기</span>
    </div>
    <div class="tab-item" data-tab="done">
      <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span>감상완료</span>
    </div>
  </nav>

  <!-- Mini Player -->
  <div class="mini-player" id="miniPlayer">
    <div class="mini-thumb"><img id="miniThumb" src="" alt="" /></div>
    <div class="mini-info">
      <div class="mini-title" id="miniTitle"></div>
      <div class="mini-artist" id="miniArtist"></div>
      <div class="mini-progress-wrap"><div class="mini-progress-bar" id="miniProgressBar"></div></div>
    </div>
    <div class="mini-controls">
      <button class="mini-btn play-btn" id="miniPlayBtn">
        <svg class="icon-play" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg class="icon-pause" style="display:none" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- ── Detail Page ── -->
<div class="detail-page" id="detailPage">
  <div class="detail-header">
    <button class="detail-back" id="detailBack">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg> 목록
    </button>
    <div class="detail-header-actions">
      <button class="detail-action-btn" id="detailDoneBtn" title="감상 완료">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <button class="detail-action-btn" id="detailFavBtn" title="즐겨찾기">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>
  </div>

  <div class="detail-scroll">
    <div class="detail-image-wrap">
      <img id="detailImage" src="" alt="" onerror="this.src='https://placehold.co/430x300/F2F2F7/8E8E93?text=No+Image'" />
    </div>
    <div class="detail-info">
      <div class="detail-badges">
        <span class="detail-room-badge" id="detailRoom"></span>
        <span class="detail-done-badge" id="detailDoneBadge">✓ 감상 완료</span>
      </div>
      <div class="detail-title-ko" id="detailTitleKo"></div>
      <div class="detail-title-orig" id="detailTitleOrig"></div>
      <div class="detail-artist-ko" id="detailArtistKo"></div>
      <div class="detail-artist-orig" id="detailArtistOrig"></div>
      <div class="detail-stars" id="detailStars"></div>

      <div class="audio-player">
        <div class="audio-top">
          <button class="audio-play-btn" id="audioPlayBtn">
            <span class="icon-play"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></span>
            <span class="icon-pause"><svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></span>
          </button>
          <div class="audio-info-wrap">
            <div class="audio-label">오디오 해설</div>
            <div class="audio-times">
              <span id="audioCurrent">0:00</span>
              <span id="audioTotal">--:--</span>
            </div>
          </div>
          <button class="speed-btn" id="speedControlBtn">1.0x</button>
        </div>
        <div class="audio-progress-wrap" id="audioProgressWrap">
          <div class="audio-progress-bar" id="audioProgressBar"></div>
        </div>
      </div>
      <audio id="audioEl" preload="metadata"></audio>

      <div class="detail-desc-label">작품 설명</div>
      <div class="detail-desc" id="detailDesc"></div>
      
      <div id="relatedWorks"></div>

    </div>
  </div>
</div>
</body>
</html>
